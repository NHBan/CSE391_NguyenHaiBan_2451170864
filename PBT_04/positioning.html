<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Positioning</title>
    <link rel="stylesheet" href="positioning.css">
</head>
<body>

    <header class="header">
        <div class="header-container">
            <div class="logo">LOGO</div>
            <nav class="nav">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Products</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <h3>Sidebar</h3>
            <ul>
                <li class="list-style-type-none">Danh mục 1</li>
                <li class="list-style-type-none">Danh mục 2</li>
                <li class="list-style-type-none">Danh mục 3</li>
            </ul>
        </aside>

        <main class="content">
            <div class="product-card">
                <div class="badge">HOT</div>
                <div class="product-image">
                    <img src="#" alt="" class="card-img">
                </div>
                <div class="product-info">
                    <h3>Sản phẩm 1</h3>
                    <p>Mô tả sản phẩm.</p>
                </div>
            </div>
            
            <!-- Tạo khoảng trống để test scroll -->
            <div style="height: 1500px; background: #eee; margin-top: 20px; padding: 20px;">
            </div>
        </main>
    </div>

    <div class="scroll-top">↑</div>

</body>
</html>
