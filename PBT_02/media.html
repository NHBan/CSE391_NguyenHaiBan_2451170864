<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Trang Đa Phương Tiện</title>
</head>

<body>
    <h2>Logo SVG</h2>
    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow" />
    </svg>

    <h2>Danh sách sản phẩm</h2>
    <div>
        <figure>
            <img src="https://picsum.photos/id/20/600/400" alt="Chiếc máy tính xách tay đặt trên bàn làm việc gỗ"
                loading="lazy" style="max-width: 100%; height: auto; border-radius: 8px;">
            <figcaption>Sản phẩm 01: Laptop văn phòng cao cấp</figcaption>
        </figure>
        <figure>
            <img src="https://picsum.photos/id/1/600/400" alt="Bàn phím cơ có đèn nền RGB" loading="lazy"
                style="max-width: 100%; height: auto; border-radius: 8px;">
            <figcaption>Sản phẩm 02: Bàn phím cơ Gaming</figcaption>
        </figure>
        <figure>
            <img src="https://picsum.photos/id/26/600/400" alt="Tiện ích công nghệ và đồ dùng cá nhân" loading="lazy"
                style="max-width: 100%; height: auto; border-radius: 8px;">
            <figcaption>Sản phẩm 03: Combo phụ kiện du lịch</figcaption>
        </figure>
    </div>
    <hr>
    <h2>Nhạc nền giới thiệu</h2>
    <audio controls>
        <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
        Trình duyệt của bạn không hỗ trợ thẻ audio.
    </audio>
    <hr>
    <h2>Video Review Sản phẩm</h2>
    <video width="640" height="360" controls poster="https://picsum.photos/id/101/640/360">
        <source src="movie.mp4" type="video/mp4">
        <source src="movie.webm" type="video/webm">
        Trình duyệt của bạn không hỗ trợ thẻ video.
    </video>
    <hr>
    <h2>Video yotobe</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/X35EGlWdB4Y?si=0V0oBwHakOnbQg9T"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>

</html>
