<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#" method="post">
        <fieldset>
            <legend>Dang ky</legend>
            <label for="email">Nhap email cua ban o day</label>
            <input type="email" name="" id="email" placeholder="Nhap email ...">
            <label for="pass">Nhap mat khau cua ban o day</label>
            <input type="password" id="pass" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" title="Vui long nhap co mot chu cai in hoa va 1 so">
            <label for="confirm-pass">Nhap lai mat khau</label>
            <input type="password" name="" id="confirm-pass">
            <label >
                <input type="checkbox" name="" id="">Dong y voi dieu khoan
            </label>
            <button type="submit">Dang ky</button>
        </fieldset>
    </form>
</body>
</html>
