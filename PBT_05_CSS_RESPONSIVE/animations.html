<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3N</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <div class="container">
        <h1>Hiệu ứng CSS & Animation</h1>

        <div class="section">
            <h3>4. Loading Spinner</h3>
            <div class="spinner"></div>
        </div>

        <div class="section fade-in-box">
            <p>Hieu ung truot len mem mai</p>
        </div>

        <div class="product-list">
            <div class="card">
                <div class="img-container">
                    <img src="https://picsum.photos/300/200" alt="Product">
                </div>
                <div class="card-content">
                    <h3>Sản phẩm cao cấp</h3>
                    <p>Mô tả ngắn gọn về sản phẩm với hiệu ứng mượt mà.</p>
                    <button class="btn-buy">Mua ngay</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
